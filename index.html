<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#ffffff;
  height:100vh;
  width:100vw;
  font-family:"Times New Roman", Times, serif;
}

.grid{
  display:grid;
  width:100%;
  height:100%;
  grid-template-columns:repeat(5,1fr); /* ← ahora 5 columnas */
  grid-auto-rows:1fr;
}

.cell{
  border:1px solid #e3e3e3;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(12px,1.6vw,22px);
  color:#333;
  letter-spacing:0.5px;
}
</style>
</head>

<body>

<div class="grid">

  <!-- FILA 1 -->
  <div class="cell"></div>
  <div class="cell" style="background:#e0e0e0;">I1-C</div>
  <div class="cell"></div> <!-- NUEVA COLUMNA -->
  <div class="cell"></div>
  <div class="cell" style="background:#e9e1f5;">P2-C</div>

  <!-- FILA 2 -->
  <div class="cell"></div>
  <div class="cell" style="background:#e0e0e0;">I1-C</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell" style="background:#e9e1f5;">P2-C</div>

  <!-- FILA 3 -->
  <div class="cell"></div>
  <div class="cell" style="background:#e0e0e0;">I1-C</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell" style="background:#e9e1f5;">P2-C</div>

  <!-- FILA 4 -->
  <div class="cell"></div>
  <div class="cell" style="background:#eadede;">I2-C</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell" style="background:#e9e1f5;">P2-C</div>

  <!-- FILA 5 -->
  <div class="cell"></div>
  <div class="cell" style="background:#eadede;">I2-C</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell" style="background:#e9e1f5;">P2-A</div>

  <!-- FILA 6 -->
  <div class="cell"></div>
  <div class="cell" style="background:#eadede;">I2-C</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell" style="background:#e9e1f5;">P2-A</div>

  <!-- FILA 7 -->
  <div class="cell"></div>
  <div class="cell" style="background:#dde8f1;">P1-C</div>
  <div class="cell"></div>
  <div class="cell" style="background:#f0e4e4;">P-C</div>
  <div class="cell"></div>

  <!-- FILA 8 -->
  <div class="cell"></div>
  <div class="cell" style="background:#dde8f1;">P1-C</div>
  <div class="cell"></div>
  <div class="cell" style="background:#f0e4e4;">P-C</div>
  <div class="cell"></div>

  <!-- FILA 9 -->
  <div class="cell"></div>
  <div class="cell" style="background:#e5e5e5;">C-C</div>
  <div class="cell"></div>
  <div class="cell" style="background:#f0e4e4;">P-C</div>
  <div class="cell"></div>

  <!-- FILA 10 -->
  <div class="cell"></div>
  <div class="cell" style="background:#e5e5e5;">C-C</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>

  <!-- FILA 11 -->
  <div class="cell"></div>
  <div class="cell" style="background:#d7e6f5;">P1-A</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>

  <!-- FILA 12 -->
  <div class="cell"></div>
  <div class="cell" style="background:#d7e6f5;">P1-A</div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>

</div>

</body>
</html>
